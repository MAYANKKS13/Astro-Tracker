<mat-card class="event-card">


    <mat-card-header>

        <mat-card-title>
            {{event.title}}
        </mat-card-title>


        <mat-card-subtitle>
            {{event.eventType}}
        </mat-card-subtitle>


    </mat-card-header>



    <mat-card-content>


        <p>
            <b>Source:</b>
            {{event.source}}
        </p>


        <p>
            <b>Start:</b>
            {{event.startTime}}
        </p>


        <p>
            <b>End:</b>
            {{event.endTime}}
        </p>


        <p>
            <b>Visibility:</b>
            {{event.visibilityInfo}}
        </p>


    </mat-card-content>


</mat-card>
