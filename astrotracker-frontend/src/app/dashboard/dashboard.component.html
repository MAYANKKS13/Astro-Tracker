<mat-toolbar color="primary">

  🌌 Astro Tracker Dashboard

</mat-toolbar>


<div class="dashboard-container">


<h2>
  Live Astronomical Events
</h2>

<p>
    Total Events: {{events.length}}

<div class="events-grid">

    <app-event-card

    </app-event-card>


</div>


</div>
